name: DSL CI

on:
  push:
    branches: [main]
    paths:
      - "dsl/**"
  pull_request:
    branches: [main]
    paths:
      - "dsl/**"

concurrency:
  group: dsl-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: DSL tests (Python, TypeScript, Go)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.11.3"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Set up pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: dsl/tests/ts/pnpm-lock.yaml

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - name: Run DSL Python tests
        run: |
          cd dsl && uv sync && PYTHONPATH=.. uv run pytest tests/python -v

      - name: Run DSL TypeScript tests
        run: |
          cd dsl/tests/ts && pnpm install && pnpm test

      - name: Run DSL Go tests
        run: |
          cd dsl/tests/go && go test ./... -v
