name: DSL CI

on:
  push:
    branches: [main]
    paths:
      - "dsl/**"
  pull_request:
    branches: [main]
    paths:
      - "dsl/**"

concurrency:
  group: dsl-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: DSL tests (Python, TypeScript, Go)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.21"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 11.7.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: dsl/tests/ts/pnpm-lock.yaml

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - name: Run DSL Python tests
        run: |
          cd dsl && uv sync && PYTHONPATH=.. uv run pytest tests/python -v

      - name: Run DSL TypeScript tests
        run: |
          cd dsl/tests/ts && pnpm install && pnpm test

      - name: Run DSL Go tests
        run: |
          cd dsl/tests/go && go test ./... -v
