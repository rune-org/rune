name: RTES Service CI

on:
  push:
    branches: ["main"]
    paths:
      - "services/rtes/**"
      - ".github/workflows/rtes-ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "services/rtes/**"
      - ".github/workflows/rtes-ci.yml"

env:
  CARGO_TERM_COLOR: always
  WORKING_DIRECTORY: services/rtes

jobs:
  quality-check:
    name: Quality & Security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Rust Toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Rust Toolchain (nightly for rustfmt)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Cache dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: services/rtes

      - name: Check Formatting
        run: cargo +nightly fmt --all -- --check

      - name: Lint with Clippy
        run: cargo +stable clippy --all-targets --all-features -- -D warnings -D clippy::unwrap_used

      - name: Security Audit
        run: cargo +stable audit

      - name: Run Tests
        run: cargo +stable test --all-features

  docker-build:
    name: Build Docker Image (Cargo Chef)
    runs-on: ubuntu-latest
    needs: quality-check
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # This step leverages the Cargo Chef setup in the Dockerfile for optimal caching
      - name: Build Docker Image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ env.WORKING_DIRECTORY }}
          file: ${{ env.WORKING_DIRECTORY }}/Dockerfile
          push: false
          tags: rtes:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
