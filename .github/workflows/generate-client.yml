name: Generate API Client
on:
  workflow_dispatch:

jobs:
  generate-client:
    name: Generate API Client
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.11.2"
          enable-cache: true
      
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13.11"
      
      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.0
      
      - name: Install API dependencies
        run: |
          uv sync
          uv pip install pyyaml
        working-directory: ./services/api
      
      - name: Generate OpenAPI schema
        run: uv run python -m scripts.generate_openapi
        working-directory: ./services/api
      
      - name: Generate client with hey-api
        run: pnpm dlx @hey-api/openapi-ts -f heyapi.conf.js
      
      - name: Create PR with client changes
        run: |
          git config --local user.email "268621759+rune-ci-bot[bot]@users.noreply.github.com"
          git config --local user.name "rune-ci-bot[bot]"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          BRANCH_NAME="chore/regenerate-api-client-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH_NAME"
          git commit -m "chore: regenerate API client"
          git push -u origin "$BRANCH_NAME"
          gh pr create \
            --title "chore: regenerate API client" \
            --body "This PR was automatically generated to update the API client based on the latest OpenAPI schema." \
            --base main
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
