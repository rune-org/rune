name: Generate API Client
on:
  workflow_dispatch:

jobs:
  generate-client:
    name: Generate API Client
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.21"
          enable-cache: true
      
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13.11"
      
      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 11.7.0
      
      - name: Install API dependencies
        run: |
          uv sync
          uv pip install pyyaml
        working-directory: ./services/api
      
      - name: Generate OpenAPI schema
        run: uv run python -m scripts.generate_openapi
        working-directory: ./services/api
      
      - name: Generate client with hey-api
        # Keep this pinned until a hey-api release special-cases SSE annotations.
        run: pnpm dlx @hey-api/openapi-ts@0.97.3 -f heyapi.conf.js
      
      - name: Create PR with client changes
        run: |
          git config --local user.email "268621759+rune-ci-bot[bot]@users.noreply.github.com"
          git config --local user.name "rune-ci-bot[bot]"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          BRANCH_NAME="chore/regenerate-api-client-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH_NAME"
          git commit -m "chore: regenerate API client"
          git push -u origin "$BRANCH_NAME"
          gh pr create \
            --title "chore: regenerate API client" \
            --body "This PR was automatically generated to update the API client based on the latest OpenAPI schema." \
            --base main
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
